<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Transaction Completed</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; height: 100vh; }
        .success-card { max-width: 500px; margin: auto; border: none; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; padding: 40px; }
        .checkmark-wrapper { width: 100px; height: 100px; background: #d4edda; color: #28a745; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card success-card bg-white">
            <div class="checkmark-wrapper shadow-sm">
                <i class="fas fa-check"></i>
            </div>
            <h1 class="fw-bold text-dark mb-3">Success!</h1>
            <p class="text-muted mb-4 lead">Your payment has been successfully processed and your vehicle is reserved. You can find all details in your profile.</p>
            
            <div class="d-grid gap-2">
                <a href="{% url 'my_reservations' %}" class="btn btn-success btn-lg shadow-sm">
                    <i class="fas fa-car me-2"></i>View My Reservations
                </a>
                <a href="{% url 'vehicle_list' %}" class="btn btn-outline-secondary">
                    <i class="fas fa-home me-2"></i>Back to Home
                </a>
            </div>
        </div>
    </div>
</body>
</html>
