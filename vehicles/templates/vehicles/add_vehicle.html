<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Vehicle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <h2 class="mb-4">Add New Vehicle & Insurance</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">Vehicle Details</div>
                    <div class="card-body">
                        {{ v_form.as_p }}
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-success text-white">Insurance Details</div>
                    <div class="card-body">
                        {{ i_form.as_p }}
                    </div>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg mt-4 w-100">Save</button>
    </form>

    <script>
        var inputs = document.querySelectorAll('input, select, textarea');
        inputs.forEach(function(input) {
            input.classList.add('form-control');
        });
    </script>

</body>
</html>
